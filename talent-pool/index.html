<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex,nofollow,noarchive" />
  <title>工讀生人才庫追蹤</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <header>
    <div class="header-inner">
      <div>
        <h1>工讀生人才庫追蹤</h1>
        <div class="subtitle" id="sourceStatus">載入中…</div>
      </div>
      <nav class="toolbar" aria-label="頁面導覽">
        <a class="tool" href="/">回人力戰情室</a>
        <a class="tool" href="/interns/index.html">公開快照</a>
        <a class="tool" href="/radar-addon/index.html">資訊雷達</a>
      </nav>
    </div>
  </header>

  <main class="wrap">
    <div class="privacy">
      內部人才庫頁：呈現姓名、電話、Email、居住地（縣市/區）、基本工作資訊、履歷狀態與每月工時追蹤；不含薪資金額、身分證、完整地址、銀行帳號。
    </div>

    <section class="metrics" id="metrics"></section>

    <section class="panel">
      <h2>搜尋與篩選</h2>
      <div class="panel-body filters">
        <input id="q" placeholder="搜尋姓名、電話、Email、居住地、現職、學歷/職業、備註、工作訊號" />
        <select id="status">
          <option value="">全部狀態</option>
          <option value="active">active</option>
          <option value="history_only">history_only</option>
          <option value="paused">paused</option>
        </select>
        <select id="resume">
          <option value="">履歷全部</option>
          <option value="link">有履歷連結</option>
          <option value="status">有履歷狀態</option>
          <option value="missing">待補履歷</option>
        </select>
        <select id="contact">
          <option value="">聯絡資料全部</option>
          <option value="complete">電話+Email完整</option>
          <option value="missing_phone">缺電話</option>
          <option value="missing_email">缺Email</option>
          <option value="missing_required">缺必要欄位</option>
        </select>
        <select id="level">
          <option value="">全部等級</option>
        </select>
      </div>
    </section>

    <section class="grid" id="peopleGrid"></section>
  </main>

  <script src="./talent.js"></script>
</body>
</html>
