<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow,noarchive">
  <title>人力戰情系統</title>
  <style>
    :root {
      --ink: #17202a;
      --muted: #667085;
      --line: #d8dee8;
      --panel: #ffffff;
      --bg: #f6f8fb;
      --blue: #1f6feb;
      --cyan: #008c95;
      --green: #17833b;
      --amber: #b7791f;
      --red: #c2410c;
      --soft-blue: #eaf2ff;
      --soft-green: #eaf7ef;
      --soft-amber: #fff4db;
      --soft-red: #fff0e8;
      --shadow: 0 10px 26px rgba(20, 31, 48, .08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      color: var(--ink);
      background: var(--bg);
      font-family: "Microsoft JhengHei", "Noto Sans TC", system-ui, sans-serif;
      letter-spacing: 0;
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 240px minmax(0, 1fr);
    }

    aside {
      background: #102033;
      color: #f8fafc;
      padding: 24px 18px;
    }

    .brand {
      font-size: 20px;
      font-weight: 800;
      margin-bottom: 28px;
    }

    .nav {
      display: grid;
      gap: 8px;
    }

    .nav button {
      width: 100%;
      min-height: 42px;
      border: 0;
      border-radius: 6px;
      padding: 10px 12px;
      background: transparent;
      color: #cbd5e1;
      text-align: left;
      font: inherit;
      cursor: pointer;
    }

    .nav button[aria-selected="true"] {
      background: #223853;
      color: #fff;
    }

    main {
      padding: 24px;
      overflow: auto;
    }

    header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0 0 6px;
      font-size: 26px;
      line-height: 1.25;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
      font-size: 14px;
    }

    .toolbar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .tool {
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--ink);
      border-radius: 6px;
      padding: 9px 12px;
      min-height: 38px;
      font: inherit;
    }

    a.tool {
      text-decoration: none;
      display: inline-flex;
      align-items: center;
    }

    .tool.primary {
      background: var(--blue);
      border-color: var(--blue);
      color: #fff;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(5, minmax(130px, 1fr));
      gap: 12px;
      margin-bottom: 18px;
    }

    .metric,
    .panel,
    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .metric {
      padding: 14px;
      min-height: 96px;
    }

    .metric .label {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 8px;
    }

    .metric .value {
      font-size: 28px;
      font-weight: 800;
      line-height: 1;
    }

    .metric .hint {
      margin-top: 8px;
      color: var(--muted);
      font-size: 12px;
    }

    .grid {
      display: grid;
      grid-template-columns: minmax(0, 1.45fr) minmax(320px, .8fr);
      gap: 16px;
      align-items: start;
    }

    .panel {
      overflow: hidden;
    }

    main > .panel {
      margin-bottom: 16px;
    }

    .panel h2 {
      margin: 0;
      padding: 16px 18px;
      font-size: 17px;
      border-bottom: 1px solid var(--line);
    }

    .panel-body {
      padding: 16px 18px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    th,
    td {
      padding: 11px 10px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
    }

    th {
      color: var(--muted);
      background: #f1f4f8;
      font-weight: 700;
      white-space: nowrap;
    }

    tr:last-child td {
      border-bottom: 0;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 3px 8px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .badge.green {
      color: var(--green);
      background: var(--soft-green);
    }

    .badge.blue {
      color: var(--blue);
      background: var(--soft-blue);
    }

    .badge.amber {
      color: var(--amber);
      background: var(--soft-amber);
    }

    .badge.red {
      color: var(--red);
      background: var(--soft-red);
    }

    .stack {
      display: grid;
      gap: 12px;
    }

    .card {
      padding: 14px;
    }

    .person {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: start;
    }

    .person h3,
    .card h3 {
      margin: 0 0 4px;
      font-size: 15px;
    }

    .meta {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }

    .bar {
      height: 8px;
      background: #e8edf4;
      border-radius: 999px;
      overflow: hidden;
      margin-top: 10px;
    }

    .bar span {
      display: block;
      height: 100%;
      background: var(--cyan);
      width: var(--width);
    }

    .split {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
      margin-top: 16px;
    }

    .list {
      display: grid;
      gap: 10px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .list li {
      border-bottom: 1px solid var(--line);
      padding-bottom: 10px;
      line-height: 1.5;
    }

    .list li:last-child {
      border-bottom: 0;
      padding-bottom: 0;
    }

    .notice {
      display: grid;
      gap: 8px;
      margin-bottom: 16px;
    }

    .notice strong {
      font-size: 15px;
    }

    .notice .row {
      display: grid;
      grid-template-columns: 120px minmax(0, 1fr) auto;
      gap: 12px;
      align-items: start;
      padding: 12px 0;
      border-bottom: 1px solid var(--line);
    }

    .notice .row:last-child {
      border-bottom: 0;
    }

    .automation-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(180px, 1fr));
      gap: 12px;
    }

    .automation-card {
      display: grid;
      gap: 8px;
      min-height: 132px;
    }

    .automation-card .value {
      font-size: 24px;
      font-weight: 800;
    }

    .automation-card a {
      justify-self: start;
    }

    .hidden {
      display: none;
    }

    @media (max-width: 1100px) {
      .app {
        grid-template-columns: 1fr;
      }

      aside {
        position: sticky;
        top: 0;
        z-index: 5;
        padding: 14px 16px;
      }

      .brand {
        margin-bottom: 12px;
      }

      .nav {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }

      .nav button {
        text-align: center;
      }

      .metrics {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .grid,
      .split,
      .automation-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 640px) {
      main {
        padding: 16px;
      }

      header {
        display: block;
      }

      .toolbar {
        justify-content: flex-start;
        margin-top: 12px;
      }

      .metrics {
        grid-template-columns: 1fr;
      }

      table {
        font-size: 13px;
      }

      th,
      td {
        padding: 9px 8px;
      }

      .notice .row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside>
      <div class="brand">人力戰情系統</div>
      <nav class="nav" aria-label="戰情視圖">
        <button type="button" aria-selected="true" data-view="overview">總覽</button>
        <button type="button" aria-selected="false" data-view="reviews">名詞審核</button>
        <button type="button" aria-selected="false" data-view="people">人才庫</button>
        <button type="button" aria-selected="false" data-view="assignments">派工建議</button>
      </nav>
    </aside>

    <main>
      <header>
        <div>
          <h1>本週人力與審核戰情</h1>
          <p class="subtitle">每週五 13:30 先產生審核確認清單；Kevin 確認後才寫入詞庫、審核、關閉事件與薪資。</p>
          <p class="subtitle" id="sourceStatus">資料來源：讀取中</p>
        </div>
        <div class="toolbar">
          <a class="tool" href="/radar-addon/index.html">資訊雷達</a>
          <a class="tool" href="/interns/index.html">工讀生快照</a>
          <button class="tool" type="button" id="toggleSeed">切換示範資料</button>
          <button class="tool primary" type="button" id="nextAction">產生本週確認摘要</button>
        </div>
      </header>

      <section class="metrics" id="metrics"></section>

      <article class="panel">
        <h2>最新自動化資料</h2>
        <div class="panel-body">
          <div class="automation-grid" id="automationCards"></div>
        </div>
      </article>

      <article class="panel">
        <h2>待確認事項</h2>
        <div class="panel-body">
          <div class="notice" id="confirmationRows"></div>
        </div>
      </article>

      <section data-section="overview">
        <div class="grid">
          <article class="panel">
            <h2>進行中案件</h2>
            <div class="panel-body">
              <table>
                <thead>
                  <tr>
                    <th>事件</th>
                    <th>工讀生</th>
                    <th>分鐘</th>
                    <th>狀態</th>
                    <th>風險</th>
                  </tr>
                </thead>
                <tbody id="caseRows"></tbody>
              </table>
            </div>
          </article>

          <article class="panel">
            <h2>人力負載</h2>
            <div class="panel-body stack" id="personCards"></div>
          </article>
        </div>

        <div class="split">
          <article class="panel">
            <h2>詞庫判斷摘要</h2>
            <div class="panel-body">
              <table>
                <thead>
                  <tr>
                    <th>錯誤文字</th>
                    <th>正確文字</th>
                    <th>判斷</th>
                    <th>原因</th>
                  </tr>
                </thead>
                <tbody id="dictionaryRows"></tbody>
              </table>
            </div>
          </article>

          <article class="panel">
            <h2>下週派工提醒</h2>
            <div class="panel-body">
              <ul class="list" id="assignmentList"></ul>
            </div>
          </article>
        </div>
      </section>

      <section class="hidden" data-section="reviews">
        <article class="panel">
          <h2>自訂義名詞審核清單</h2>
          <div class="panel-body">
            <table>
              <thead>
                <tr>
                  <th>事件 ID</th>
                  <th>事件標題</th>
                  <th>候選詞</th>
                  <th>預計動作</th>
                  <th>派薪狀態</th>
                </tr>
              </thead>
              <tbody id="reviewRows"></tbody>
            </table>
          </div>
        </article>
      </section>

      <section class="hidden" data-section="people">
        <article class="panel">
          <h2>人才庫</h2>
          <div class="panel-body">
            <table>
              <thead>
                <tr>
                  <th>姓名</th>
                  <th>薪資範本</th>
                  <th>可承接工作</th>
                  <th>品質訊號</th>
                  <th>建議</th>
                </tr>
              </thead>
              <tbody id="peopleRows"></tbody>
            </table>
          </div>
        </article>
      </section>

      <section class="hidden" data-section="assignments">
        <article class="panel">
          <h2>派工池</h2>
          <div class="panel-body">
            <table>
              <thead>
                <tr>
                  <th>任務</th>
                  <th>適合人選</th>
                  <th>原因</th>
                  <th>確認點</th>
                </tr>
              </thead>
              <tbody id="assignmentRows"></tbody>
            </table>
          </div>
        </article>
      </section>
    </main>
  </div>

  <script>
    const data = {
      cases: [
        {
          id: "2uqNjm7gRiOWb8RdccVwIg",
          title: "115519-1150518 財務相談室-17-孫瑜",
          person: "孫瑜",
          minutes: 65,
          status: "已完成",
          risk: "低",
          salary: "已建立（不顯示金額）",
          dictionaryAction: "新增 3 筆，已存在 2 筆，排除 1 筆"
        },
        {
          id: "pending-example-1",
          title: "待審核案件範例（尚未接入真實資料）",
          person: "yachu Zhang",
          minutes: 0,
          status: "示範資料",
          risk: "待接入",
          salary: "待確認",
          dictionaryAction: "等待每週自動化擷取"
        }
      ],
      dictionary: [
        { wrong: "袁家中心", correct: "原家中心", decision: "可納入", reason: "社福服務脈絡中的專有/機構用語" },
        { wrong: "袁民", correct: "原民", decision: "可納入", reason: "原民為社福界常用詞" },
        { wrong: "袁銘", correct: "原民", decision: "可納入", reason: "同批脈絡中明確指向原民" },
        { wrong: "魚鱗", correct: "雲林", decision: "不納入", reason: "左詞有正常語意，可能造成全域誤替換" }
      ],
      people: [
        {
          name: "孫瑜",
          template: "初級工讀生薪資計算",
          work: "逐字稿名詞修正、資料整理",
          quality: "本週完成 1 案，詞庫判斷需少量複核",
          load: 42,
          suggestion: "可持續安排詞庫修正與標準化任務"
        },
        {
          name: "yachu Zhang",
          template: "認證實習生薪資計算",
          work: "進階校對、資料判讀、課程支援",
          quality: "適合承接規則較多的審核任務",
          load: 28,
          suggestion: "可優先測試好理家在內容優化任務"
        },
        {
          name: "李怡霖",
          template: "怡霖薪資計算",
          work: "行政流程、內容整理、專案協作",
          quality: "需獨立薪資範本追蹤",
          load: 34,
          suggestion: "適合擔任流程型任務的固定窗口"
        }
      ],
      assignments: [
        {
          task: "每週自訂義名詞審核",
          person: "孫瑜 / yachu Zhang",
          reason: "已累積逐字稿與名詞修正脈絡",
          gate: "低信心詞先交 Kevin 判斷"
        },
        {
          task: "好理家在文章與工具優化",
          person: "yachu Zhang",
          reason: "適合較高判讀與整理能力任務",
          gate: "先以一篇文章或一個頁面試做"
        },
        {
          task: "馴錢師活動資料整理",
          person: "李怡霖",
          reason: "流程與行政型工作可標準化",
          gate: "需定義輸出格式與截止時間"
        }
      ],
      confirmations: [
        {
          type: "系統狀態",
          title: "目前沒有真實待確認資料",
          detail: "這個 v0.1 dashboard 尚未接每週五自動化輸出的真實 JSON，因此正式待確認數量應為 0。",
          status: "已釐清"
        },
        {
          type: "示範資料",
          title: "待審核案件範例",
          detail: "這筆只是用來示範未來每週自動化會顯示的欄位，不代表現在 InfoCenter 真的有一案等待你確認。",
          status: "示範"
        },
        {
          type: "下一步",
          title: "接入每週審核報告",
          detail: "週五 13:30 自動化會先產生候選詞、事件、分鐘數與薪資預覽；之後這裡會顯示需要你確認的批次。",
          status: "待接入"
        }
      ],
      source: {
        mode: "fallback",
        updatedAt: "2026-05-29T17:10:00+08:00",
        sources: ["HTML fallback seed data"],
        publicNote: "目前顯示的是備援示範資料；正式資料會由 Codex 更新 data/dashboard.json。"
      }
    };

    const $ = (selector) => document.querySelector(selector);
    const $$ = (selector) => Array.from(document.querySelectorAll(selector));

    const addon = {
      interns: null,
      radar: null,
      workItems: "",
      errors: []
    };

    function badgeClass(value) {
      if (value === "已完成" || value === "可納入" || value === "低") return "green";
      if (value === "待確認" || value === "示範" || value === "待接入" || value === "示範資料") return "amber";
      if (value === "已釐清") return "blue";
      if (value === "不納入" || value === "高") return "red";
      return "blue";
    }

    function badge(value) {
      return `<span class="badge ${badgeClass(value)}">${value}</span>`;
    }

    function formatSourceTime(value) {
      if (!value) return "尚未產生";
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return value;
      return date.toLocaleString("zh-TW", {
        timeZone: "Asia/Taipei",
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    async function loadLatestData() {
      try {
        const response = await fetch("data/dashboard.json", { cache: "no-store" });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const latest = await response.json();
        Object.assign(data, latest);
        data.source = {
          mode: "snapshot",
          ...latest.source,
          publicNote: latest.source?.publicNote || "這份資料由 Codex 依 dashboard 需求讀取來源後更新。"
        };
      } catch (error) {
        data.source = {
          ...data.source,
          loadError: error.message
        };
      }
    }

    async function fetchJson(path) {
      const response = await fetch(path, { cache: "no-store" });
      if (!response.ok) throw new Error(`${path}: HTTP ${response.status}`);
      return response.json();
    }

    async function fetchText(path) {
      const response = await fetch(path, { cache: "no-store" });
      if (!response.ok) throw new Error(`${path}: HTTP ${response.status}`);
      return response.text();
    }

    async function loadAddonData() {
      const tasks = [
        fetchJson("data/interns.public.json")
          .then((value) => { addon.interns = value; })
          .catch((error) => { addon.errors.push(error.message); }),
        fetchJson("data/radar-week.json")
          .then((value) => { addon.radar = value; })
          .catch((error) => { addon.errors.push(error.message); }),
        fetchText("data/radar-work-items.md")
          .then((value) => { addon.workItems = value; })
          .catch((error) => { addon.errors.push(error.message); })
      ];
      await Promise.all(tasks);
    }

    function renderSourceStatus() {
      const mode = data.source?.mode === "snapshot" ? "公開 snapshot" : "備援示範資料";
      const sources = (data.source?.sources || []).join("、") || "未標示";
      const updatedAt = formatSourceTime(data.source?.updatedAt);
      $("#sourceStatus").textContent = `資料來源：${mode}｜更新時間：${updatedAt}｜來源：${sources}`;
    }

    function renderMetrics() {
      const completed = data.cases.filter((item) => item.status === "已完成").length;
      const pending = data.confirmations.filter((item) => item.status === "待確認").length;
      const minutes = data.cases.reduce((sum, item) => sum + item.minutes, 0);
      const includeCount = data.dictionary.filter((item) => item.decision === "可納入").length;
      const payrollReady = data.cases.filter((item) => item.salary || item.payStatus).length;
      $("#metrics").innerHTML = [
        ["本週完成", completed, "已完成審核案件"],
        ["待確認", pending, "目前無真實待辦"],
        ["核定分鐘", minutes, "回流薪資與負載"],
        ["建議新增詞", includeCount, "不含已存在詞庫"],
        ["派薪狀態", payrollReady, "僅顯示狀態，不含金額"]
      ].map(([label, value, hint]) => `
        <article class="metric">
          <div class="label">${label}</div>
          <div class="value">${value}</div>
          <div class="hint">${hint}</div>
        </article>
      `).join("");
    }

    function isPlaceholderWeek(value) {
      return !value || String(value).includes("YYYY");
    }

    function renderAutomationCards() {
      const counts = addon.interns?.meta?.counts || {};
      const sourceModifiedAt = addon.interns?.meta?.sourceModifiedAt || addon.interns?.meta?.generatedAt;
      const weekStart = addon.radar?.meta?.weekStart;
      const weekEnd = addon.radar?.meta?.weekEnd;
      const highlights = Array.isArray(addon.radar?.highlights) ? addon.radar.highlights.length : 0;
      const hasWorkItems = addon.workItems && !addon.workItems.includes("尚未產生");
      const radarPeriod = isPlaceholderWeek(weekStart) ? "等待本週雷達" : `${weekStart}～${weekEnd}`;

      $("#automationCards").innerHTML = [
        {
          title: "工讀生公開快照",
          value: `${counts.active ?? "—"} / ${counts.total ?? "—"}`,
          meta: `active / total｜paid ${counts.paid ?? "—"}｜due ${counts.due ?? "—"}｜${formatSourceTime(sourceModifiedAt)}`,
          href: "/interns/index.html",
          cta: "打開工讀生快照"
        },
        {
          title: "每週資訊雷達",
          value: highlights,
          meta: `${radarPeriod}｜highlights`,
          href: "/radar-addon/index.html",
          cta: "打開資訊雷達"
        },
        {
          title: "工作清單",
          value: hasWorkItems ? "已產生" : "待產生",
          meta: addon.errors.length ? addon.errors.join("｜") : "新聞摘要與派薪提醒會在每週排程後更新",
          href: "/data/radar-work-items.md",
          cta: "查看工作清單"
        }
      ].map((item) => `
        <article class="card automation-card">
          <div>
            <h3>${item.title}</h3>
            <div class="value">${item.value}</div>
            <div class="meta">${item.meta}</div>
          </div>
          <a class="tool" href="${item.href}">${item.cta}</a>
        </article>
      `).join("");
    }

    function renderConfirmations() {
      $("#confirmationRows").innerHTML = data.confirmations.map((item) => `
        <div class="row">
          <div>${badge(item.status)}</div>
          <div>
            <strong>${item.title}</strong>
            <div class="meta">${item.detail}</div>
          </div>
          <div class="meta">${item.type}</div>
        </div>
      `).join("");
    }

    function renderCases() {
      $("#caseRows").innerHTML = data.cases.map((item) => `
        <tr>
          <td><strong>${item.title}</strong><div class="meta">${item.id}</div></td>
          <td>${item.person}</td>
          <td>${item.minutes}</td>
          <td>${badge(item.status)}</td>
          <td>${badge(item.risk)}</td>
        </tr>
      `).join("");

      $("#reviewRows").innerHTML = data.cases.map((item) => `
        <tr>
          <td>${item.id}</td>
          <td>${item.title}</td>
          <td>${item.dictionaryAction}</td>
          <td>${item.status === "已完成" ? "已完成三步驗證" : "等待 Kevin 確認"}</td>
          <td>${item.salary ? "已建立（不顯示金額）" : "待確認"}</td>
        </tr>
      `).join("");
    }

    function renderDictionary() {
      $("#dictionaryRows").innerHTML = data.dictionary.map((item) => `
        <tr>
          <td>${item.wrong}</td>
          <td>${item.correct}</td>
          <td>${badge(item.decision)}</td>
          <td>${item.reason}</td>
        </tr>
      `).join("");
    }

    function renderPeople() {
      $("#personCards").innerHTML = data.people.map((person) => `
        <article class="card">
          <div class="person">
            <div>
              <h3>${person.name}</h3>
              <div class="meta">${person.work}</div>
            </div>
            ${badge(`${person.load}%`)}
          </div>
          <div class="bar" aria-label="${person.name} 負載 ${person.load}%"><span style="--width: ${person.load}%"></span></div>
        </article>
      `).join("");

      $("#peopleRows").innerHTML = data.people.map((person) => `
        <tr>
          <td><strong>${person.name}</strong></td>
          <td>${person.template}</td>
          <td>${person.work}</td>
          <td>${person.quality}</td>
          <td>${person.suggestion}</td>
        </tr>
      `).join("");
    }

    function renderAssignments() {
      $("#assignmentList").innerHTML = data.assignments.map((item) => `
        <li><strong>${item.task}</strong><br><span class="meta">${item.person}｜${item.reason}</span></li>
      `).join("");

      $("#assignmentRows").innerHTML = data.assignments.map((item) => `
        <tr>
          <td>${item.task}</td>
          <td>${item.person}</td>
          <td>${item.reason}</td>
          <td>${item.gate}</td>
        </tr>
      `).join("");
    }

    function switchView(view) {
      $$("[data-view]").forEach((button) => {
        button.setAttribute("aria-selected", String(button.dataset.view === view));
      });
      $$("[data-section]").forEach((section) => {
        section.classList.toggle("hidden", section.dataset.section !== view);
      });
    }

    function render() {
      renderSourceStatus();
      renderMetrics();
      renderAutomationCards();
      renderConfirmations();
      renderCases();
      renderDictionary();
      renderPeople();
      renderAssignments();
    }

    $$("[data-view]").forEach((button) => {
      button.addEventListener("click", () => switchView(button.dataset.view));
    });

    $("#nextAction").addEventListener("click", () => {
      alert("目前沒有真實待確認資料。這個 dashboard 下一步要接入每週五自動化產出的真實審核報告。");
    });

    $("#toggleSeed").addEventListener("click", () => {
      data.cases.reverse();
      render();
    });

    Promise.all([loadLatestData(), loadAddonData()]).finally(render);
  </script>
</body>
</html>
