<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Radar Add-on</title>
    <style>
      :root { --bg:#0b1220; --panel:#0f1b33; --text:#e7eefc; --muted:#a8b3d1; --line:#223256; --accent:#76a9ff; --bad:#ff8a8a; --good:#7cf0b2; }
      body { margin:0; font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, "Noto Sans TC", Arial; background:var(--bg); color:var(--text); }
      header { padding:16px 18px; border-bottom:1px solid var(--line); display:flex; gap:12px; align-items:center; flex-wrap:wrap; }
      header h1 { margin:0; font-size:16px; font-weight:700; letter-spacing:.2px; }
      header .meta { color:var(--muted); font-size:12px; }
      .wrap { display:grid; grid-template-columns: 280px 1fr; min-height: calc(100vh - 58px); }
      aside { border-right:1px solid var(--line); padding:14px; background: rgba(255,255,255,0.02); }
      main { padding:14px; }
      .card { background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:12px; margin-bottom:12px; }
      .tabs { display:flex; gap:8px; flex-wrap:wrap; }
      .tab { border:1px solid var(--line); background:transparent; color:var(--text); padding:8px 10px; border-radius:10px; cursor:pointer; font-size:13px; }
      .tab.active { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(118,169,255,.15) inset; }
      label { display:block; font-size:12px; color:var(--muted); margin:10px 0 6px; }
      input, select { width:100%; background:#0a1630; border:1px solid var(--line); color:var(--text); padding:8px 10px; border-radius:10px; font-size:13px; }
      .btn { border:1px solid var(--line); background:#0a1630; color:var(--text); padding:8px 10px; border-radius:10px; cursor:pointer; font-size:13px; width:100%; }
      .btn.primary { border-color: var(--accent); }
      .row { display:flex; gap:10px; flex-wrap:wrap; align-items:center; justify-content:space-between; }
      .pill { display:inline-flex; gap:6px; align-items:center; padding:2px 8px; border-radius:999px; border:1px solid var(--line); color:var(--muted); font-size:12px; }
      .pill.good { color:var(--good); border-color: rgba(124,240,178,.25); }
      .pill.bad { color:var(--bad); border-color: rgba(255,138,138,.25); }
      .list { display:flex; flex-direction:column; gap:10px; }
      .item h3 { margin:0 0 6px; font-size:14px; }
      .item .sub { color:var(--muted); font-size:12px; display:flex; gap:8px; flex-wrap:wrap; }
      .item ul { margin:8px 0 0; padding-left:18px; color:var(--text); }
      .item a { color: var(--accent); text-decoration: none; }
      .item a:hover { text-decoration: underline; }
      pre { white-space: pre-wrap; word-break: break-word; background:#071126; border:1px solid var(--line); padding:10px; border-radius:10px; }
      .muted { color:var(--muted); }
      @media (max-width: 900px) { .wrap { grid-template-columns: 1fr; } aside { border-right:none; border-bottom:1px solid var(--line); } }
    </style>
  </head>
  <body>
    <header>
      <h1>Radar Add-on</h1>
      <div class="meta" id="meta">載入中…</div>
    </header>
    <div class="wrap">
      <aside>
        <div class="card">
          <div class="tabs">
            <button class="tab active" data-view="highlights">精選</button>
            <button class="tab" data-view="library">條目庫</button>
            <button class="tab" data-view="tracking">追蹤</button>
            <button class="tab" data-view="export">匯出</button>
          </div>
        </div>

        <div class="card" id="filters">
          <div class="row">
            <div class="pill" id="countPill">0 items</div>
            <div class="pill" id="sourcePill">week: –</div>
          </div>
          <label>關鍵字</label>
          <input id="q" placeholder="搜尋標題/摘要/標籤" />
          <label>主題</label>
          <select id="topic">
            <option value="">全部</option>
            <option value="tw_social_work">台灣社工環境</option>
            <option value="tw_fin_ed">台灣財務教育</option>
            <option value="global_ai">全球 AI（可轉用）</option>
            <option value="codex_workflow">Codex/自動化（可轉用）</option>
            <option value="growth_gamification">會員/成長案例（可轉用）</option>
          </select>
          <label>狀態</label>
          <select id="status">
            <option value="">全部</option>
            <option value="new">new</option>
            <option value="tracking">tracking</option>
            <option value="resolved">resolved</option>
            <option value="stale">stale</option>
          </select>
          <label>可信度</label>
          <select id="cred">
            <option value="">全部</option>
            <option value="high">high</option>
            <option value="medium">medium</option>
            <option value="low">low</option>
          </select>
          <div style="height:10px"></div>
          <button class="btn" id="reset">重設篩選</button>
        </div>

        <div class="card">
          <button class="btn primary" id="reload">重新載入資料</button>
          <div class="muted" style="margin-top:8px;font-size:12px" id="paths"></div>
        </div>
      </aside>

      <main>
        <div class="card" id="view"></div>
      </main>
    </div>

    <script src="./main.js"></script>
  </body>
</html>
